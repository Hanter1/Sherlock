name: Catalog probe

on:
  schedule:
    # Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Probe critical catalog sites
        run: python scripts/probe_catalog.py
